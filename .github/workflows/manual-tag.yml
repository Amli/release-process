name: Release
on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: 'Commit hash to tag. Defaults to latest commit on main.'
        required: false
        default: ''
      tag_label:
        description: 'Tag label. Defaults to current date (YYYY-MM-DD).'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_VERSION: ${{ github.sha }}

jobs:
  add-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set up variables
        id: vars
        run: |
          if [[ "${{ github.event.inputs.commit_hash }}" != "" ]]; then
            COMMIT_HASH="${{ github.event.inputs.commit_hash }}"
          else
            COMMIT_HASH=$(git ls-remote https://github.com/${{ github.repository }} main | awk '{print $1}')
          fi
          if [[ "${{ github.event.inputs.tag_label }}" != "" ]]; then
            TAG_LABEL="${{ github.event.inputs.tag_label }}"
          else
            TAG_LABEL=$(date +"%Y-%m-%d")
          fi
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "tag_label=$TAG_LABEL" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check image exists
        run: |
          IMAGE_NAME=${GITHUB_REPOSITORY@L}
          docker pull ${{ env.REGISTRY }}/${IMAGE_NAME}:${{ steps.vars.outputs.commit_hash }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.tag_label }}

      - name: Create and push tag
        if: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/${{ steps.vars.outputs.tag_label }}" \
            -f sha="${{ steps.vars.outputs.commit_hash }}"

      - name: Tag docker image
        run:

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.vars.outputs.tag_label }}}
          body: |
            Image: ${{ steps.meta.outputs.tags }}
