name: Release
on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: 'Commit hash to tag. Defaults to latest commit on main.'
        required: false
        default: ''
      tag_label:
        description: 'Tag label. Defaults to current date (YYYY-MM-DD).'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Set up variables
        id: vars
        run: |
          if [[ "${{ github.event.inputs.commit_hash }}" != "" ]]; then
            COMMIT_HASH="${{ github.event.inputs.commit_hash }}"
          else
            COMMIT_HASH=$(git ls-remote https://github.com/${{ github.repository }} main | awk '{print $1}')
          fi
          if [[ "${{ github.event.inputs.tag_label }}" != "" ]]; then
            VERSION="${{ github.event.inputs.tag_label }}"
          else
            VERSION=$(date +"%Y-%m-%d")
          fi
          # corresponding commit hash
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          
          # release version
          echo "release_version=$VERSION" >> $GITHUB_OUTPUT

          # tag label used for git
          echo "git_tag=v$VERSION" >> $GITHUB_OUTPUT

          # lowercase organisation/repository name
          IMAGE_NAME=${GITHUB_REPOSITORY@L}
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.vars.outputs.commit_hash }}
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Check image exists
        run: docker pull ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.commit_hash }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.release_version }}

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/${{ steps.vars.outputs.git_tag }}" \
            -f sha="${{ steps.vars.outputs.commit_hash }}"

      - name: Tag docker image
        run: |
          docker buildx imagetools create ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.commit_hash }} --tag ${{ steps.meta.outputs.tags }}

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.vars.outputs.git_tag }}} --notes "Image: ${{ steps.meta.outputs.tags }}" --fail-on-no-commits --latest=false --verify-tag

      - name: Validate
        run: |
          IMAGE_NAME=${GITHUB_REPOSITORY@L}
          docker pull --force ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.release_version }}
          docker run --rm ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.release_version }}
