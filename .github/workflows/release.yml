name: Release

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      tag: 
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image_name: 
        required: true
        type: string
      tag: 
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          body: |
            Image: ${{ inputs.image_name }}
